name: Test Variants Action

on:
  push:
    branches: [ test-action ]
env:
  DEVELOPER_DIR: /Applications/Xcode_13.2.1.app/Contents/Developer

jobs:
  switch:
    name: Attempt to switch variants on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-12]
    steps:
    - uses: actions/checkout@v2
    - uses: backbase/variants@action-bottled-1.1.0
      with:
        spec: variants.yml
        platform: ios
        variant: beta
        verbose: true
